<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard - Quantity Measurement</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

<header class="app-header">
  <div class="header-container">
    <h1>Quantity Measurement</h1>
    <div class="user-account">
      <button id="themeToggle" class="theme-toggle" style="position:static; padding:8px 12px; margin-right: 10px;">🌙 Dark Mode</button>
      <span class="user-email" id="userEmail">user@example.com</span>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </div>
</header>

<main class="dashboard-container">
  
  <section class="type-section">
    <h4>CHOOSE TYPE</h4>
    <div class="cards-container" id="typeCards">
      <div class="type-card active" data-type="LENGTH">
        <div class="icon length-icon">
          <!-- Custom Ruler SVG -->
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#FFA500" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.3 15.3l-13.6 6.4c-.6.3-1.4.1-1.8-.5L2.2 12.8c-.5-.8-.2-1.8.5-2.2l13.6-6.4c.8-.3 1.6-.1 2.1.5l3.5 8.4c.5.7.1 1.7-.6 2.2z"></path>
            <path d="M14.5 9.5l-2 4"></path>
            <path d="M10.5 11.5l-2 4"></path>
            <path d="M6.5 13.5l-2 4"></path>
          </svg>
        </div>
        <span class="label">Length</span>
      </div>
      <div class="type-card" data-type="WEIGHT">
        <div class="icon weight-icon">
          <!-- Scales SVG -->
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#FFA500" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v18"></path>
            <path d="M3 8l9-4 9 4"></path>
            <path d="M4.5 12h15"></path>
            <path d="M6 12l-2 6c-1.1 0-2-.9-2-2v-4h4z"></path>
            <path d="M18 12l2 6c1.1 0 2-.9 2-2v-4h-4z"></path>
          </svg>
        </div>
        <span class="label">Weight</span>
      </div>
      <div class="type-card" data-type="TEMPERATURE">
        <div class="icon temp-icon">
          <!-- Thermometer SVG -->
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#FF4500" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"></path>
            <path d="M11.5 8v2"></path>
          </svg>
        </div>
        <span class="label">Temperature</span>
      </div>
      <div class="type-card" data-type="VOLUME">
        <div class="icon volume-icon">
          <!-- Beaker / Volume SVG -->
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#5BC0BE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2z"></path>
            <path d="M8 2v3"></path>
            <path d="M16 2v3"></path>
            <path d="M4 11h16"></path>
            <path d="M12 11v10"></path>
          </svg>
        </div>
        <span class="label">Volume</span>
      </div>
    </div>
  </section>

  <section class="action-section">
    <h4>CHOOSE ACTION</h4>
    <div class="action-tabs" id="actionTabs">
      <button class="action-tab" data-action="COMPARISON">Comparison</button>
      <button class="action-tab active" data-action="CONVERSION">Conversion</button>
      <button class="action-tab" data-action="ARITHMETIC">Arithmetic</button>
    </div>
  </section>

  <!-- Workspace where Conversion or Arithmetic UI will be injected -->
  <section class="workspace-section" id="workspace">
     <!-- Default content populated by JS -->
  </section>

</main>

<script type="module" src="js/pages/dashboard.js"></script>
<script src="js/utils/theme.js"></script>
</body>
</html>
